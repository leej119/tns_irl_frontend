<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The New School IRL - Edit Profile</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet">
    <!-- Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="styles.css">
</head>

<body class="bg-white">

    <div class="app-container" style="background: var(--color-white);">

        <!-- Main Content Scrollable -->
        <main class="content-scroll edit-profile-layout">

            <div class="profile-header-group">
                <h1 class="page-title-massive">Edit Profile</h1>
                <p class="profile-subtitle">Update your Personal Information</p>
            </div>

            <!-- Avatar Container -->
            <div class="avatar-upload-container">
                <div class="avatar-circle">
                    <i class="ph-bold ph-user user-icon-huge"></i>
                    <span class="avatar-upload-text">Add Picture</span>
                </div>
            </div>

            <!-- Profile Settings List -->
            <div class="profile-settings-list">
                <button class="profile-setting-item">
                    <span>Change Name</span>
                </button>
                <button class="profile-setting-item">
                    <span>Add Pronouns?</span>
                </button>
                <button class="profile-setting-item">
                    <span>Birthday</span>
                </button>
                <button class="profile-setting-item">
                    <span>Change Password</span>
                </button>
            </div>

            <div class="flex-spacer"></div>

            <!-- Save Changes Footer -->
            <div class="profile-footer-fixed">
                <button class="save-changes-btn" onclick="window.location.href='index.html'">Save Changes</button>
            </div>

        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <a href="index.html" class="nav-item tab-nav" aria-label="Home">
                <i class="ph ph-house"></i>
            </a>
            <a href="messages.html" class="nav-item tab-nav" aria-label="Chat">
                <i class="ph ph-chat-circle"></i>
            </a>
            <a href="#" class="nav-item tab-nav" aria-label="Search">
                <i class="ph ph-magnifying-glass"></i>
            </a>
            <a href="your_clubs.html" class="nav-item tab-nav" aria-label="Calendar">
                <i class="ph ph-calendar-blank"></i>
            </a>
            <a href="edit_profile.html" class="nav-item active tab-nav" aria-label="Profile">
                <i class="ph ph-user"></i>
            </a>
        </nav>

    </div>

    <script src="app.js"></script>
</body>

</html>
