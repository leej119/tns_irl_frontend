<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The New School IRL - Your Clubs</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet">
    <!-- Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="app-container">

        <!-- Header -->
        <header class="app-header">
            <div class="logo-box">
                <span class="logo-tns">THE NEW SCHOOL</span>
                <span class="logo-irl">IRL</span>
            </div>
            <button class="icon-btn" aria-label="Messages" onclick="window.location.href='messages.html'">
                <i class="ph ph-envelope-simple"></i>
            </button>
        </header>

        <!-- Main Content Scrollable -->
        <main class="content-scroll">
            <h1 class="page-header text-red text-center">CALENDAR</h1>

            <!-- Upcoming Sessions -->
            <section class="section">
                <div class="section-header-flex">
                    <h2 class="section-title">Upcoming Sessions</h2>
                    <button class="add-new-btn">+ Add new</button>
                </div>

                <div id="upcoming-sessions-list">
                    <!-- Dynamic sessions will be injected here -->
                </div>
            </section>

            <!-- Your Events Calendar -->
            <section class="section">
                <div class="section-header-flex">
                    <h2 class="section-title">Your Events</h2>
                    <button class="add-new-btn">+ Add new</button>
                </div>

                <div class="calendar-widget">
                    <div class="calendar-header">
                        <button class="cal-nav" id="prev-month"><i class="ph ph-caret-left"></i></button>
                        <div class="cal-month-year">
                            <span class="month" id="cal-month"></span><br>
                            <span class="year" id="cal-year"></span>
                        </div>
                        <button class="cal-nav" id="next-month"><i class="ph ph-caret-right"></i></button>
                    </div>
                    <div class="calendar-grid" id="calendar-grid">
                        <div class="cal-day-header">Mon</div>
                        <div class="cal-day-header">Tue</div>
                        <div class="cal-day-header">Wed</div>
                        <div class="cal-day-header">Thu</div>
                        <div class="cal-day-header">Fri</div>
                        <div class="cal-day-header">Sat</div>
                        <div class="cal-day-header">Sun</div>

                        <!-- Dynamic days will be generated here by JS -->
                    </div>
                </div>
            </section>

            <div class="bottom-spacer"></div>
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <a href="index.html" class="nav-item tab-nav" aria-label="Home">
                <i class="ph ph-house"></i>
            </a>
            <a href="messages.html" class="nav-item tab-nav" aria-label="Chat">
                <i class="ph ph-chat-circle"></i>
            </a>
            <a href="#" class="nav-item tab-nav" aria-label="Search">
                <i class="ph ph-magnifying-glass"></i>
            </a>
            <a href="your_clubs.html" class="nav-item active tab-nav" aria-label="Calendar">
                <i class="ph ph-calendar-blank"></i>
            </a>
            <a href="edit_profile.html" class="nav-item tab-nav" aria-label="Profile">
                <i class="ph ph-user"></i>
            </a>
        </nav>

    </div>

    <!-- Add Event Modal -->
    <div class="modal-overlay" id="add-event-modal">
        <div class="modal-content">
            <h3 class="modal-header">Add New Event</h3>
            
            <div class="form-group">
                <label class="form-label">Event Title</label>
                <input type="text" class="form-input" id="event-title-input" placeholder="e.g. Design wireframes">
            </div>
            
            <div class="form-group">
                <label class="form-label">Date</label>
                <input type="date" class="form-input" id="event-date-input">
            </div>
            
            <div class="form-group">
                <label class="form-label">Time</label>
                <input type="text" class="form-input" id="event-time-input" placeholder="e.g. 10:00-13:00">
            </div>
            
            <div class="form-group">
                <label class="form-label">Description</label>
                <input type="text" class="form-input" id="event-desc-input" placeholder="Short description...">
            </div>
            
            <div class="modal-actions">
                <button class="btn-cancel" id="cancel-event-btn">Cancel</button>
                <button class="btn-submit" id="save-event-btn">Save</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
