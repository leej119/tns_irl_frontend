<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The New School IRL - Report Processing</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet">
    <!-- Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="logo-box">
                <span class="logo-tns">THE NEW SCHOOL</span>
                <span class="logo-irl">IRL</span>
            </div>
            <button class="icon-btn" aria-label="Messages" onclick="window.location.href='messages.html'">
                <i class="ph ph-envelope-simple"></i>
            </button>
        </header>

        <!-- Main Content Scrollable -->
        <main class="content-scroll flex-col">
            <h1 class="page-header text-red text-center" style="margin-bottom: var(--spacing-xl);">Report</h1>

            <!-- Reviewing graphic/icon -->
            <div class="reviewing-graphic-container">
                <i class="ph ph-user-focus"></i>
                <i class="ph-fill ph-chat-circle-dots speech-bubble-icon"></i>
            </div>

            <h2 class="section-title text-center"
                style="font-size: 1.2rem; line-height: 1.3; max-width: 250px; margin: 0 auto var(--spacing-lg) auto;">
                We are currently reviewing your request
            </h2>

            <!-- Success Text block -->
            <div class="reviewing-text-block">
                <p>Thank you for your response!</p>
                <p>While we review the account, here is what you can do in the meantime:</p>
            </div>

            <!-- Follow-up Links -->
            <div class="action-links-list">
                <a href="#" class="action-link-item">
                    <span>Report for another activity</span>
                    <i class="ph ph-caret-right"></i>
                </a>
                <a href="index.html" class="action-link-item">
                    <span>Return to our service</span>
                    <i class="ph ph-caret-right"></i>
                </a>
            </div>

        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <a href="index.html" class="nav-item tab-nav" aria-label="Home">
                <i class="ph ph-house"></i>
            </a>
            <a href="messages.html" class="nav-item active tab-nav" aria-label="Chat">
                <i class="ph ph-chat-circle"></i>
            </a>
            <a href="#" class="nav-item tab-nav" aria-label="Search">
                <i class="ph ph-magnifying-glass"></i>
            </a>
            <a href="your_clubs.html" class="nav-item tab-nav" aria-label="Calendar">
                <i class="ph ph-calendar-blank"></i>
            </a>
            <a href="#" class="nav-item tab-nav" aria-label="Profile">
                <i class="ph ph-user"></i>
            </a>
        </nav>

    </div>

    <script src="app.js"></script>
</body>

</html>
