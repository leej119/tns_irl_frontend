<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The New School IRL - Your Clubs</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet">
    <!-- Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="app-container">

        <!-- Header -->
        <header class="app-header">
            <div class="logo-box">
                <span class="logo-tns">THE NEW SCHOOL</span>
                <span class="logo-irl">IRL</span>
            </div>
            <button class="icon-btn" aria-label="Messages">
                <i class="ph ph-envelope-simple"></i>
            </button>
        </header>

        <!-- Main Content Scrollable -->
        <main class="content-scroll">
            <h1 class="page-header text-red text-center">CALENDAR</h1>

            <!-- Upcoming Sessions -->
            <section class="section">
                <div class="section-header-flex">
                    <h2 class="section-title">Upcoming Sessions</h2>
                    <button class="add-new-btn">+ Add new</button>
                </div>

                <div class="session-card">
                    <div class="session-indicator red"></div>
                    <div class="session-details">
                        <p class="session-time">10:00-13:00</p>
                        <h3 class="session-title">Design wireframes</h3>
                        <p class="session-desc">Meowwww</p>
                    </div>
                    <button class="more-btn"><i class="ph ph-dots-three"></i></button>
                </div>

                <div class="session-card border-bottom">
                    <div class="session-indicator red"></div>
                    <div class="session-details">
                        <p class="session-time">10:00-13:00</p>
                        <h3 class="session-title">Eat donuts</h3>
                        <p class="session-desc">I like the twisty one</p>
                    </div>
                    <button class="more-btn"><i class="ph ph-dots-three"></i></button>
                </div>
            </section>

            <!-- Your Events Calendar -->
            <section class="section">
                <div class="section-header-flex">
                    <h2 class="section-title">Your Events</h2>
                    <button class="add-new-btn">+ Add new</button>
                </div>

                <div class="calendar-widget">
                    <div class="calendar-header">
                        <button class="cal-nav"><i class="ph ph-caret-left"></i></button>
                        <div class="cal-month-year">
                            <span class="month">SEPTEMBER</span><br>
                            <span class="year">2026</span>
                        </div>
                        <button class="cal-nav"><i class="ph ph-caret-right"></i></button>
                    </div>
                    <div class="calendar-grid">
                        <div class="cal-day-header">Mon</div>
                        <div class="cal-day-header">Tue</div>
                        <div class="cal-day-header">Wed</div>
                        <div class="cal-day-header">Thu</div>
                        <div class="cal-day-header">Fri</div>
                        <div class="cal-day-header">Sat</div>
                        <div class="cal-day-header">Sun</div>

                        <!-- Row 1 -->
                        <div class="cal-day past">31</div>
                        <div class="cal-day past">30</div>
                        <div class="cal-day">1</div>
                        <div class="cal-day active-red">2<div class="dot-indicator"></div>
                        </div>
                        <div class="cal-day">3</div>
                        <div class="cal-day">4</div>
                        <div class="cal-day">5</div>

                        <!-- Row 2 -->
                        <div class="cal-day">6<div class="dot-indicator"></div>
                        </div>
                        <div class="cal-day">7</div>
                        <div class="cal-day">8<div class="dot-indicator"></div>
                        </div>
                        <div class="cal-day">9</div>
                        <div class="cal-day">10<div class="dot-indicator"></div>
                        </div>
                        <div class="cal-day">11</div>
                        <div class="cal-day">12</div>

                        <!-- Row 3 -->
                        <div class="cal-day">13<div class="dot-indicator"></div>
                        </div>
                        <div class="cal-day">14</div>
                        <div class="cal-day">15<div class="dot-indicator"></div>
                            <div class="dot-indicator"></div>
                        </div>
                        <div class="cal-day">16</div>
                        <div class="cal-day">17<div class="dot-indicator"></div>
                        </div>
                        <div class="cal-day">18</div>
                        <div class="cal-day">19</div>

                        <!-- Row 4 -->
                        <div class="cal-day">20<div class="dot-indicator"></div>
                            <div class="dot-indicator"></div>
                        </div>
                        <div class="cal-day">21</div>
                        <div class="cal-day active-red outline">22<div class="dot-indicator"></div>
                            <div class="dot-indicator"></div>
                        </div>
                        <div class="cal-day">23<div class="dot-indicator"></div>
                        </div>
                        <div class="cal-day">24</div>
                        <div class="cal-day">25</div>
                        <div class="cal-day">26</div>

                        <!-- Row 5 -->
                        <div class="cal-day">27</div>
                        <div class="cal-day">28</div>
                        <div class="cal-day">29<div class="dot-indicator"></div>
                        </div>
                        <div class="cal-day">30</div>
                        <div class="cal-day">31</div>
                        <div class="cal-day">1</div>
                        <div class="cal-day">2</div>
                    </div>
                </div>
            </section>

            <div class="bottom-spacer"></div>
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <a href="index.html" class="nav-item tab-nav" aria-label="Home">
                <i class="ph ph-house"></i>
            </a>
            <a href="#" class="nav-item tab-nav" aria-label="Chat">
                <i class="ph ph-chat-circle"></i>
            </a>
            <a href="#" class="nav-item tab-nav" aria-label="Search">
                <i class="ph ph-magnifying-glass"></i>
            </a>
            <a href="your_clubs.html" class="nav-item active tab-nav" aria-label="Calendar">
                <i class="ph ph-calendar-blank"></i>
            </a>
            <a href="#" class="nav-item tab-nav" aria-label="Profile">
                <i class="ph ph-user"></i>
            </a>
        </nav>

    </div>

    <script src="app.js"></script>
</body>

</html>
