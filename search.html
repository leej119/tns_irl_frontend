<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The New School IRL - Explore</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="logo-box">
                <span class="logo-tns">THE NEW SCHOOL</span>
                <span class="logo-irl">IRL</span>
            </div>
            <button class="icon-btn" aria-label="Messages" onclick="window.location.href='messages.html'">
                <i class="ph ph-envelope-simple"></i>
            </button>
        </header>

        <!-- Main Content Scrollable -->
        <main class="content-scroll">
            <!-- Search Bar -->
            <div class="search-container">
                <div class="search-box">
                    <i class="ph ph-magnifying-glass search-icon"></i>
                    <input type="text" placeholder="Search events..." class="search-input">
                </div>
            </div>

            <!-- All Events List -->
            <section class="section">
                <!-- Event 1 -->
                <button class="section-header-btn" style="border-bottom: none; text-align: left; width: 100%;" onclick="window.location.href='event_detail.html'">
                    <div class="event-card">
                        <div class="event-info">
                            <h3 class="event-title">Heels on the ground: a look at fashion and sustainability</h3>
                            <p class="event-meta">STARR FOUNDATION HALL</p>
                            <p class="event-time" style="color: var(--color-red); margin-top: 4px;">Lecture & Panel Discussion</p>
                            <p class="event-time">Feb 12 • 6:00 PM</p>
                        </div>
                        <div class="event-image placeholder-img-1" style="background-color: var(--color-red);">
                            <span class="graphic-text" style="color: white;">FASH<br>ION<br>FUT<br>URE</span>
                        </div>
                    </div>
                </button>

                <!-- Event 2 -->
                <button class="section-header-btn" style="border-bottom: none; text-align: left; width: 100%;">
                    <div class="event-card">
                        <div class="event-info">
                            <h3 class="event-title">NSSR Research Methods Workshop</h3>
                            <p class="event-meta">6 EAST 16TH STREET</p>
                            <p class="event-time" style="color: var(--color-red); margin-top: 4px;">Workshop & Training</p>
                            <p class="event-time">Mar 5 • 3:00 PM</p>
                        </div>
                        <div class="event-image placeholder-img-2"></div>
                    </div>
                </button>

                <!-- Event 3 -->
                <button class="section-header-btn" style="border-bottom: none; text-align: left; width: 100%;">
                    <div class="event-card">
                        <div class="event-info">
                            <h3 class="event-title">Documentary: Voices of the Future</h3>
                            <p class="event-meta">TISHMAN AUDITORIUM</p>
                            <p class="event-time" style="color: var(--color-red); margin-top: 4px;">Film & Media Screening</p>
                            <p class="event-time">Apr 10 • 7:00 PM</p>
                        </div>
                        <div class="event-image placeholder-img-1">
                            <span class="graphic-text">DOC<br>FILM</span>
                        </div>
                    </div>
                </button>

                <!-- Event 4 -->
                <button class="section-header-btn" style="border-bottom: none; text-align: left; width: 100%;">
                    <div class="event-card">
                        <div class="event-info">
                            <h3 class="event-title">Author Reading: Modern Political Movements</h3>
                            <p class="event-meta">UNIVERSITY CENTER</p>
                            <p class="event-time" style="color: var(--color-red); margin-top: 4px;">Author Reading & Discussion</p>
                            <p class="event-time">May 2 • 5:00 PM</p>
                        </div>
                        <div class="event-image placeholder-img-2"></div>
                    </div>
                </button>
            </section>

            <div class="bottom-spacer"></div>
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <a href="index.html" class="nav-item tab-nav" aria-label="Home">
                <i class="ph ph-house"></i>
            </a>
            <a href="messages.html" class="nav-item tab-nav" aria-label="Chat">
                <i class="ph ph-chat-circle"></i>
            </a>
            <a href="search.html" class="nav-item tab-nav active" aria-label="Search">
                <i class="ph ph-magnifying-glass"></i>
            </a>
            <a href="your_clubs.html" class="nav-item tab-nav" aria-label="Calendar">
                <i class="ph ph-calendar-blank"></i>
            </a>
            <a href="edit_profile.html" class="nav-item tab-nav" aria-label="Profile">
                <i class="ph ph-user"></i>
            </a>
        </nav>
    </div>
    <script src="app.js"></script>
</body>
</html>
